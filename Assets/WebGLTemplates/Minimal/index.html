<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Unity Web Player | {{{ PRODUCT_NAME }}}</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    #unity-container {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #unity-canvas {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover;
      background: black;
    }
  </style>

#if SHOW_DIAGNOSTICS
  <link rel="stylesheet" href="<<<TemplateData/diagnostics.css>>>">
  <script src="<<<TemplateData/diagnostics.js>>>"></script>
#endif

</head>

<body>
  <div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>
  </div>

#if SHOW_DIAGNOSTICS
  <div id="unity-footer">
    <img id="diagnostics-icon" src="TemplateData/webmemd-icon.png">
  </div>
#endif

  <script src="Build/{{{ LOADER_FILENAME }}}"></script>

  <script>
    var canvas = document.querySelector("#unity-canvas");

    // Mobile fix
    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      var meta = document.createElement('meta');
      meta.name = 'viewport';
      meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
      document.head.appendChild(meta);

      canvas.style.width = "100%";
      canvas.style.height = "100%";
      canvas.style.position = "fixed";
    }

    createUnityInstance(canvas, {
      arguments: [],
      dataUrl: "Build/{{{ DATA_FILENAME }}}",
      frameworkUrl: "Build/{{{ FRAMEWORK_FILENAME }}}",
#if USE_THREADS
      workerUrl: "Build/{{{ WORKER_FILENAME }}}",
#endif
#if USE_WASM
      codeUrl: "Build/{{{ CODE_FILENAME }}}",
#endif
#if SYMBOLS_FILENAME
      symbolsUrl: "Build/{{{ SYMBOLS_FILENAME }}}",
#endif
      streamingAssetsUrl: "StreamingAssets",
      companyName: {{{ JSON.stringify(COMPANY_NAME) }}},
      productName: {{{ JSON.stringify(PRODUCT_NAME) }}},
      productVersion: {{{ JSON.stringify(PRODUCT_VERSION) }}},
      matchWebGLToCanvasSize: true
    }).then((unityInstance) => {

#if SHOW_DIAGNOSTICS
      document.getElementById("diagnostics-icon").onclick = () => {
        unityDiagnostics.openDiagnosticsDiv(unityInstance.GetMetricsInfo);
      };
#endif

    }).catch((message) => {
      alert(message);
    });
  </script>
</body>
</html>
